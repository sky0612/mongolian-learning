<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>몽골어 배우기</title>
<style>
body{font-family:Arial;padding:20px;max-width:800px;margin:auto}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{border:1px solid #ddd;padding:10px;text-align:left}
button,select{padding:8px;margin:5px}
</style>
</head>
<body>
<h1>몽골어 배우기</h1>

<select id="cat" onchange="render()">
<option>일반 회화</option>
<option>교회 회화</option>
</select>

<div id="single"></div>
<table id="tbl">
<thead><tr><th>몽골어</th><th>발음</th><th>뜻</th></tr></thead>
<tbody></tbody>
</table>

<script>
const db={
"일반 회화":[
["Сайн байна уу?","사인 바이노 우","안녕하세요"],
["Баярлалаа","바야를랄라","감사합니다"],
["Уучлаарай","우칠라라이","죄송합니다"],
["Таны нэр хэн бэ?","타니 네르 헨 베","이름이 무엇인가요?"],
["Та хаанаас ирсэн бэ?","타 하나스 이르센 베","어디서 오셨나요?"]
],
"교회 회화":[
["Хамтдаа залбирцгаая.","함트다 잘비르츠가야","함께 기도합시다"],
["Бурхан таныг ивээг.","부르항 타늬그 이베그","하나님께서 축복하시길 바랍니다"],
["Та сүмд анх удаа ирж байна уу?","타 숨드 안흐 우다 이르지 바이노 우","교회에 처음 오셨나요?"]
]
};

function render(){
 const tbody=document.querySelector("#tbl tbody");
 tbody.innerHTML="";
 db[cat.value].forEach(v=>{
   tbody.innerHTML += `<tr><td>${v[0]}</td><td>${v[1]}</td><td>${v[2]}</td></tr>`;
 });
}
render();
</script>
</body>
</html>
